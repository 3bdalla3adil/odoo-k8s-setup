apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  labels:
    app: odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: odoo
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: odoo
          image: your-registry.io/odoo-custom:17.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8069
            - name: longpolling
              containerPort: 8072
          envFrom:
            - secretRef:
                name: odoo-secrets
            - configMapRef:
                name: odoo-config
          volumeMounts:
            - name: odoo-data
              mountPath: /var/lib/odoo
          livenessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /web/health
              port: 8069
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo-data-pvc
